<?xml version="1.0" encoding="UTF-8"?>
<!--
  Android Adaptive Icon - Foreground (1024×1024)
  - 中央 67% (約 686px 幅) にコンテンツを収める (Safe zone)
  - 周囲は透過 (Android が背景と組み合わせる)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- シールド (中央67%以内に収める) -->
  <path d="M 512 280
           L 700 360
           L 700 520
           Q 700 660 512 760
           Q 324 660 324 520
           L 324 360 Z"
        fill="#ffffff"/>

  <!-- 6色ドット -->
  <circle cx="436" cy="450" r="40" fill="#EE8130"/>
  <circle cx="512" cy="430" r="40" fill="#6390F0"/>
  <circle cx="588" cy="450" r="40" fill="#F7D02C"/>
  <circle cx="436" cy="568" r="40" fill="#7AC74C"/>
  <circle cx="512" cy="588" r="40" fill="#A98FF3"/>
  <circle cx="588" cy="568" r="40" fill="#D685AD"/>

  <!-- チェック -->
  <path d="M 472 670 L 500 698 L 560 638"
        stroke="#3b5ba7" stroke-width="16" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
</svg>
